<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="3">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding: 40px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }

        /* Responsive 4-column grid framework */
        .n-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        /* Completely hide browser checkbox inputs */
        .hidden-checkbox {
            display: none;
        }

        /* Base interactive label block */
        .tour-btn {
            background: #2a2a2a;
            border: 3px solid #444;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .tour-btn img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 8px;
            pointer-events: none;
        }

        .tour-btn span {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        /* Sibling selection highlighting rule */
        .hidden-checkbox:checked + .tour-btn {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* Grid alignment controls */
        .pos-5 { grid-column: 1; }
        .pos-6 { grid-column: 4; }

        .footer-panel {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .confirm-btn {
            width: 50%;
            background: #00b0ff;
            color: white;
            border: none;
            padding: 20px 0;
            font-size: 32px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .confirm-btn:active {
            transform: scale(0.98);
            background: #0088cc;
        }
    </style>
</head>
<body>

    <form action="http://192.168.1.100:8000/tour_retrieve" method="POST" autocomplete="off" class="menu-container">
        
        <div class="n-grid">
            {{dynamic_menu_content}}
        </div>

        <div class="footer-panel">
            <button type="submit" class="confirm-btn">Confirm Tour</button>
        </div>

    </form>

</body>
</html>
