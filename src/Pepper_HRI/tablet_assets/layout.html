<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="3">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a;
            color: white;
            margin: 0;
            overflow: hidden; 
        }

        .main-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            gap: 30px;
            align-items: flex-start; 
        }

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px); 
            gap: 20px;
        }

        #image-gallery {
            flex: 1; 
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        .scroll-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .animate-scroll {
            animation: scrollImages 20s linear infinite;
        }

        .static-gallery {
            justify-content: flex-start;
            align-items: center;
        }

        @keyframes scrollImages {
            0% { transform: translateY(0%); }
            100% { transform: translateY(-50%); }
        }

        #image-gallery img {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #444;
            flex-shrink: 0; 
            display: block;
        }

        .control-panel {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .nav-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #332244; 
            color: white;
            border: 2px solid #553377;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            flex: 1;
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent; 
        }

        .nav-btn:active {
            background: #a855f7;
            color: #1a1a1a;
            border-color: #a855f7;
            transform: scale(0.98);
        }

        .text-column {
            flex: 2;
            height: calc(100vh - 40px);
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        h1 {
            margin: 0;
            padding-bottom: 15px;
            font-size: 4rem;
            color: #00d4ff;
            line-height: 1.2;
            background: #1a1a1a;
            position: relative;
            z-index: 10;
        }

        .text-scroll-window {
            overflow: hidden;
            height: calc(100% - 80px);
            position: relative;
        }

        .text-box {
            font-size: 38px; 
            line-height: 1.6;
            text-align: left;
            white-space: pre-wrap;
            margin: 0;
            padding: 5px;
            position: absolute;
            width: 100%;
            transform: translateY(0);
            animation: scrollTextContent 40s linear infinite;
            animation-delay: 3s;
        }

        @keyframes scrollTextContent {
            0% { transform: translateY(0); }
            85% { transform: translateY(-70%); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="left-column">
            <div id="image-gallery">
                <div class="scroll-container {{scroll_class}}">
                    {{image_gallery_html}}
                </div>
            </div>

            <div class="control-panel">
                <a href="http://192.168.1.100:8000/menu.html" class="nav-btn">Tour Select</a>
            </div>
        </div>

        <div class="text-column">
            <h1>{{artifact_title}}</h1>
            <div class="text-scroll-window">
                <div class="text-box">{{description_text}}</div>
            </div>
        </div>
    </div>
</body>
</html>
